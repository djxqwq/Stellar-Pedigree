name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate Project
      run: |
        echo "Validating Godot project structure..."
        ls -la
        test -f project.godot || exit 1
        echo "Project structure valid!"
    
    - name: Check Scripts
      run: |
        echo "Checking GDScript files..."
        find src/ -name "*.gd" -exec echo "Found script: {}" \;
        echo "Script validation complete!"
    
    - name: Check Scene Files
      run: |
        echo "Checking scene files..."
        find src/ -name "*.tscn" -exec echo "Found scene: {}" \;
        echo "Scene validation complete!"

  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate Documentation
      run: |
        echo "Generating documentation..."
        ls -la *.md
        echo "Documentation ready!"
    
    - name: Upload Docs
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: |
          *.md
          docs/
        retention-days: 90
