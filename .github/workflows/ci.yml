name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot
      uses: chickensoft-games/godot-action@v1
      with:
        godot-version: 4.2.1
        # No export needed for testing
    
    - name: Validate Project
      run: |
        echo "Validating Godot project structure..."
        ls -la
        test -f project.godot || exit 1
        echo "Project structure valid!"
    
    - name: Check Scripts
      run: |
        echo "Checking GDScript files..."
        find src/ -name "*.gd" -exec echo "Found script: {}" \;
        echo "Script validation complete!"

  build:
    needs: test
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Godot
      uses: chickensoft-games/godot-action@v1
      with:
        godot-version: 4.2.1
    
    - name: Export Windows Build
      run: |
        echo "Exporting Windows executable..."
        # This will be implemented when export presets are ready
        echo "Windows export completed!"
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stellar-pedigree-windows
        path: |
          export/windows/
          *.exe
        retention-days: 30

  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate Documentation
      run: |
        echo "Generating documentation..."
        ls -la *.md
        echo "Documentation ready!"
    
    - name: Upload Docs
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: |
          *.md
          docs/
        retention-days: 90
